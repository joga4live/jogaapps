<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>JogaFlow · Energía en equilibrio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  :root{
    --bg:#fbf5ea; --ink:#242029; --muted:#8a8296; --soft:#7c7488;
    --line:rgba(45,38,58,.12);
    --flow:#2f6ca0; --flow2:#3a8fb0; --flow-soft:rgba(47,108,160,.12);
    --gold:#b8923a; --card:#ffffff;
  }
  body{background:#ffffff;font-family:Inter,system-ui,sans-serif;color:var(--ink)}
  button{font-family:inherit}
  @keyframes jfRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes jfTwinkle{0%,100%{opacity:.25}50%{opacity:.9}}
  @keyframes jfFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .jf-scroll{scrollbar-width:none}
  .jf-scroll::-webkit-scrollbar{display:none}
  .tapfx{transition:transform .12s ease}
  .tapfx:active{transform:scale(.97)}
  @media (max-width:600px){
    .jf-phone{position:fixed!important;inset:0!important;width:100vw!important;height:100dvh!important;border-radius:0!important;padding:0!important;box-shadow:none!important}
    .jf-screen{border-radius:0!important}
    .jf-notch{display:none!important}
  }
</style>
</head>
<body>
<div style="min-height:100vh;background:radial-gradient(120% 80% at 50% 0%,#ffffff,#ffffff 70%);display:flex;align-items:center;justify-content:center;padding:40px 20px">

  <!-- PHONE -->
  <div class="jf-phone" style="position:relative;width:392px;height:844px;background:#0B0B0C;border-radius:54px;padding:13px;box-shadow:0 50px 120px -40px rgba(0,0,0,.9),0 0 0 2px #fff,inset 0 0 0 2px #000">
    <div class="jf-notch" style="position:absolute;top:13px;left:50%;transform:translateX(-50%);width:130px;height:30px;background:#0B0B0C;border-radius:0 0 18px 18px;z-index:60"></div>

    <!-- SCREEN -->
    <div class="jf-screen" style="position:relative;width:100%;height:100%;border-radius:42px;overflow:hidden;background:var(--bg)">
      <!-- ambient -->
      <div style="position:absolute;inset:0;z-index:0;pointer-events:none">
        <div style="position:absolute;top:-90px;left:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(47,108,160,.22),transparent 70%);filter:blur(8px);animation:jfFloat 9s ease-in-out infinite"></div>
        <div style="position:absolute;bottom:-70px;right:-50px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(58,143,176,.20),transparent 70%);filter:blur(8px);animation:jfFloat 11s ease-in-out infinite"></div>
        <div style="position:absolute;top:120px;left:40px;width:3px;height:3px;border-radius:50%;background:var(--flow);animation:jfTwinkle 4s ease-in-out infinite"></div>
        <div style="position:absolute;top:220px;right:50px;width:2px;height:2px;border-radius:50%;background:var(--gold);animation:jfTwinkle 5.5s ease-in-out infinite"></div>
        <div style="position:absolute;top:330px;left:120px;width:2px;height:2px;border-radius:50%;background:var(--flow2);animation:jfTwinkle 6s ease-in-out infinite"></div>
      </div>

      <!-- back -->
      <button id="jfBack" aria-label="Salir" class="tapfx" style="position:absolute;top:16px;left:16px;z-index:50;cursor:pointer;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.74);backdrop-filter:blur(8px);color:var(--ink);font-size:23px;line-height:1;display:grid;place-items:center;box-shadow:0 5px 16px -7px rgba(0,0,0,.3)">‹</button>

      <!-- HOME -->
      <div class="jf-scroll" id="jfHome" style="position:absolute;inset:0;z-index:10;overflow-y:auto;padding:84px 22px 40px">
        <!-- header -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
          <div>
            <div style="font:600 10px Inter;letter-spacing:.32em;text-transform:uppercase;color:var(--flow)">JogaFlow</div>
            <div id="jfGreeting" style="font-family:Newsreader,serif;font-weight:500;font-size:23px;color:var(--ink);margin-top:3px">Hola</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <button id="jfLang" class="tapfx" style="border:1px solid var(--line);background:rgba(45,38,58,.07);cursor:pointer;height:34px;padding:0 12px;border-radius:999px;font:600 11px Inter;letter-spacing:.05em;color:var(--flow)" aria-label="Idioma">ES</button>
            <button id="jfMute" class="tapfx" style="border:1px solid var(--line);background:rgba(45,38,58,.07);cursor:pointer;width:34px;height:34px;border-radius:50%;font-size:13px;display:grid;place-items:center" aria-label="Silenciar">🔊</button>
            <div style="display:flex;align-items:center;gap:7px;background:var(--flow-soft);border:1px solid rgba(47,108,160,.3);padding:7px 13px;border-radius:999px">
              <span style="font-size:14px">✦</span>
              <span id="jfStreak" style="font:600 13px Inter;color:var(--flow)">0</span>
            </div>
          </div>
        </div>

        <!-- intention hero -->
        <div style="position:relative;border-radius:26px;overflow:hidden;padding:30px 24px 26px;margin-bottom:22px;background:linear-gradient(165deg,#eaf3fb,#dcebf7 60%,#e8f1f6);border:1px solid rgba(47,108,160,.28);box-shadow:0 24px 50px -28px rgba(47,108,160,.55)">
          <div id="jfIntentionLabel" style="font:600 9.5px Inter;letter-spacing:.3em;text-transform:uppercase;color:var(--flow);margin-bottom:14px">Intención de hoy</div>
          <div id="jfAffirmation" style="font-family:Newsreader,serif;font-weight:500;font-size:26px;line-height:1.3;color:var(--ink);letter-spacing:-.01em;min-height:102px">Mi energía fluye y mi cuerpo me sostiene.</div>
          <div style="margin-top:22px;display:flex;align-items:center;gap:9px">
            <button id="jfAffirm" class="tapfx" style="cursor:pointer;border:0;border-radius:999px;padding:13px 22px;font:600 13px Inter;color:#fff;background:linear-gradient(135deg,var(--flow),var(--flow2));box-shadow:0 10px 24px -10px rgba(47,108,160,.9);display:inline-flex;align-items:center;gap:8px">Lo siento hoy</button>
            <button id="jfCycle" class="tapfx" aria-label="otra frase" style="cursor:pointer;border:1px solid var(--line);background:rgba(45,38,58,.08);color:var(--ink);border-radius:999px;width:44px;height:44px;font-size:17px;line-height:1">↻</button>
          </div>
        </div>

        <!-- breathing -->
        <div id="jfBreatheLabel" style="font:600 10px Inter;letter-spacing:.28em;text-transform:uppercase;color:var(--soft);margin:0 2px 12px">Respiración guiada</div>
        <button id="jfOpenBreathe" class="tapfx" style="width:100%;text-align:left;cursor:pointer;border:1px solid rgba(47,108,160,.24);border-radius:22px;padding:20px;margin-bottom:22px;background:linear-gradient(160deg,#16344e,#2f6ca0);display:flex;align-items:center;gap:16px">
          <div style="flex:0 0 auto;width:60px;height:60px;border-radius:18px;display:grid;place-items:center;background:radial-gradient(circle at 35% 30%,#7fc4e6,#3a8fb0);box-shadow:0 12px 26px -10px rgba(47,108,160,.9)">
            <span style="font-size:26px">🫧</span>
          </div>
          <div style="flex:1;min-width:0;color:#fff">
            <div id="jfBreatheTitle" style="font:600 16px Inter;margin-bottom:3px">Respira conmigo</div>
            <div id="jfBreatheSub" style="font-size:12px;color:rgba(255,255,255,.78);line-height:1.4">Ciclo 4·7·8 para calmar y recargar tu energía.</div>
          </div>
          <span style="color:#fff;font-size:20px">▶</span>
        </button>

        <!-- rituals -->
        <div id="jfRitualsLabel" style="font:600 10px Inter;letter-spacing:.28em;text-transform:uppercase;color:var(--soft);margin:0 2px 12px">Rituales de energía</div>
        <div id="jfRituals" style="display:flex;flex-direction:column;gap:12px;margin-bottom:24px"></div>

        <!-- energy check-in -->
        <div id="jfCheckLabel" style="font:600 10px Inter;letter-spacing:.28em;text-transform:uppercase;color:var(--soft);margin:0 2px 12px">¿Cómo está tu energía?</div>
        <div style="background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px 18px 20px;margin-bottom:10px">
          <div id="jfCheckScale" style="display:flex;justify-content:space-between;gap:8px"></div>
          <div id="jfCheckTip" style="margin-top:14px;font-size:13px;line-height:1.5;color:var(--soft);min-height:20px"></div>
        </div>
      </div>

      <!-- BREATHE OVERLAY -->
      <div id="jfBreatheView" style="position:absolute;inset:0;z-index:40;display:none;background:linear-gradient(180deg,#0e2438,#16344e 55%,#1d4566)">
        <button id="jfBreatheBack" aria-label="Cerrar" class="tapfx" style="position:absolute;top:18px;left:18px;z-index:5;cursor:pointer;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:#fff;font-size:23px;display:grid;place-items:center">‹</button>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center">
          <div id="jfBreathePhase" style="font:600 11px Inter;letter-spacing:.3em;text-transform:uppercase;color:#9fd3ec;margin-bottom:34px">Prepárate</div>
          <div style="position:relative;width:240px;height:240px;display:grid;place-items:center;margin-bottom:38px">
            <div id="jfBreatheRing" style="position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 38% 32%,rgba(159,211,236,.95),rgba(58,143,176,.55));box-shadow:0 0 60px -6px rgba(127,196,230,.8);transition:transform 4s ease-in-out"></div>
            <div id="jfBreatheCount" style="position:relative;font-family:Newsreader,serif;font-size:46px;color:#fff;z-index:2"></div>
          </div>
          <div id="jfBreatheCue" style="font-family:Newsreader,serif;font-size:22px;color:#eaf6fc;margin-bottom:8px">Inhala lento por la nariz</div>
          <div id="jfBreatheRound" style="font:500 12px Inter;color:rgba(255,255,255,.6);margin-bottom:30px">Ronda 1 de 4</div>
          <button id="jfBreatheToggle" class="tapfx" style="cursor:pointer;border:0;border-radius:999px;padding:14px 30px;font:600 13px Inter;color:#0e2438;background:linear-gradient(135deg,#9fd3ec,#7fc4e6);box-shadow:0 12px 28px -10px rgba(127,196,230,.9)">Comenzar</button>
        </div>
      </div>

      <!-- RITUAL OVERLAY -->
      <div id="jfRitualView" class="jf-scroll" style="position:absolute;inset:0;z-index:40;display:none;overflow-y:auto;background:var(--bg);padding:74px 24px 40px">
        <button id="jfRitualBack" aria-label="Volver" class="tapfx" style="position:absolute;top:16px;left:16px;z-index:5;cursor:pointer;width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.8);color:var(--ink);font-size:23px;display:grid;place-items:center">‹</button>
        <div id="jfRitualHead" style="margin-bottom:8px"></div>
        <div id="jfRitualSteps" style="display:flex;flex-direction:column;gap:12px;margin-top:18px"></div>
        <button id="jfRitualDone" class="tapfx" style="margin-top:24px;width:100%;cursor:pointer;border:0;border-radius:999px;padding:15px;font:600 14px Inter;color:#fff;background:linear-gradient(135deg,var(--flow),var(--flow2));box-shadow:0 12px 28px -12px rgba(47,108,160,.9)">Completar ritual</button>
      </div>

      <!-- TOAST -->
      <div id="jfToast" style="position:absolute;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);z-index:80;display:flex;align-items:center;gap:9px;background:rgba(14,36,56,.94);color:#fff;border:1px solid rgba(159,211,236,.3);border-radius:999px;padding:11px 16px;font:600 12.5px Inter;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s">
        <span style="color:#9fd3ec">✦</span><span id="jfToastText">Listo</span>
      </div>

    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var LS={lang:"jfLang",mute:"jfMute",streak:"jfStreak",last:"jfLastDay",energy:"jfEnergy"};
  function get(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  function set(k,v){try{localStorage.setItem(k,v);}catch(e){}}

  var lang = (get(LS.lang)==="en")?"en":"es";
  var muted = get(LS.mute)==="1";

  /* ---------- i18n ---------- */
  var T={
    es:{
      langLabel:"ES",
      greetMorning:"Buenos días",greetAfternoon:"Buenas tardes",greetEvening:"Buenas noches",
      intentionLabel:"Intención de hoy",
      affirmLabel:"Lo siento hoy",affirmed:"Sentido ✓",
      breatheLabel:"Respiración guiada",breatheTitle:"Respira conmigo",breatheSub:"Ciclo 4·7·8 para calmar y recargar tu energía.",
      ritualsLabel:"Rituales de energía",checkLabel:"¿Cómo está tu energía?",
      prepare:"Prepárate",inhale:"Inhala",hold:"Sostén",exhale:"Exhala",
      cueInhale:"Inhala lento por la nariz",cueHold:"Sostén el aire con calma",cueExhale:"Exhala suave por la boca",
      start:"Comenzar",pause:"Pausar",round:"Ronda",of:"de",breatheDone:"Respiración completa. Tu energía se renueva.",
      stepsLabel:"Pasos",completeRitual:"Completar ritual",ritualDone:"Ritual completado. ¡Bien hecho!",
      streakUp:"Racha +1 · sigue así",
      tips:["Tómalo con calma: una acción pequeña ya cuenta.",
            "Tu cuerpo te pide movimiento suave. Estírate un momento.",
            "Buena energía. Apóyate en ella para tu siguiente paso.",
            "Estás encendido. Canaliza esa fuerza con intención.",
            "Energía plena. Hidrátate y mantén el ritmo."],
      affs:["Mi energía fluye y mi cuerpo me sostiene.",
            "Respiro, me recargo y vuelvo a mi centro.",
            "Cuido mi cuerpo porque es la base de todo.",
            "Hoy elijo moverme con calma y propósito.",
            "Mi descanso también es parte de mi crecimiento.",
            "Tengo la fuerza para avanzar un paso más.",
            "Equilibrio: ni de más, ni de menos."],
      energyTip0:"Sin presión. Empieza con tres respiraciones lentas.",
      rituals:[
        {icon:"🌅",t:"Energizante matutino",d:"3 min · despierta tu cuerpo",
         steps:["Estira los brazos hacia el cielo y respira hondo 3 veces.","Rota los hombros hacia atrás, 10 veces, lento.","Bebe un vaso de agua antes de cualquier otra cosa.","Di tu intención del día en voz alta."]},
        {icon:"☀️",t:"Reinicio de mediodía",d:"2 min · recupera el enfoque",
         steps:["Levántate y camina 30 segundos.","Cierra los ojos y respira 4·4·4 dos veces.","Suelta la mandíbula y los hombros.","Bebe agua y vuelve con la mente despejada."]},
        {icon:"🌙",t:"Cierre de la noche",d:"4 min · libera y descansa",
         steps:["Baja las luces y silencia notificaciones.","Respira 4·7·8 durante cuatro rondas.","Repasa una cosa buena de tu día.","Agradece a tu cuerpo por hoy y descansa."]}
      ]
    },
    en:{
      langLabel:"EN",
      greetMorning:"Good morning",greetAfternoon:"Good afternoon",greetEvening:"Good evening",
      intentionLabel:"Today's intention",
      affirmLabel:"I feel it today",affirmed:"Felt ✓",
      breatheLabel:"Guided breathing",breatheTitle:"Breathe with me",breatheSub:"4·7·8 cycle to calm and recharge your energy.",
      ritualsLabel:"Energy rituals",checkLabel:"How is your energy?",
      prepare:"Get ready",inhale:"Inhale",hold:"Hold",exhale:"Exhale",
      cueInhale:"Breathe in slowly through your nose",cueHold:"Hold the air calmly",cueExhale:"Breathe out gently through your mouth",
      start:"Start",pause:"Pause",round:"Round",of:"of",breatheDone:"Breathing complete. Your energy renews.",
      stepsLabel:"Steps",completeRitual:"Complete ritual",ritualDone:"Ritual completed. Well done!",
      streakUp:"Streak +1 · keep going",
      tips:["Take it easy: one small action already counts.",
            "Your body wants gentle movement. Stretch for a moment.",
            "Good energy. Lean on it for your next step.",
            "You're switched on. Channel that strength with intention.",
            "Full energy. Hydrate and keep the rhythm."],
      affs:["My energy flows and my body holds me.",
            "I breathe, I recharge, I return to my center.",
            "I care for my body because it is the base of everything.",
            "Today I choose to move with calm and purpose.",
            "My rest is also part of my growth.",
            "I have the strength to take one more step.",
            "Balance: not too much, not too little."],
      energyTip0:"No pressure. Start with three slow breaths.",
      rituals:[
        {icon:"🌅",t:"Morning energizer",d:"3 min · wake up your body",
         steps:["Stretch your arms to the sky and breathe deep 3 times.","Roll your shoulders back, 10 times, slowly.","Drink a glass of water before anything else.","Say your intention for the day out loud."]},
        {icon:"☀️",t:"Midday reset",d:"2 min · regain focus",
         steps:["Stand up and walk for 30 seconds.","Close your eyes and breathe 4·4·4 twice.","Release your jaw and shoulders.","Drink water and return with a clear mind."]},
        {icon:"🌙",t:"Evening wind-down",d:"4 min · release and rest",
         steps:["Dim the lights and silence notifications.","Breathe 4·7·8 for four rounds.","Recall one good thing from your day.","Thank your body for today and rest."]}
      ]
    }
  };
  function t(){return T[lang];}

  /* ---------- sound (WebAudio, no files) ---------- */
  var actx=null;
  function tone(kind){
    if(muted) return;
    try{
      if(!actx){var AC=window.AudioContext||window.webkitAudioContext; actx=AC?new AC():null;}
      if(!actx) return;
      if(actx.state==="suspended") actx.resume();
      var now=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
      o.type= kind==="success"?"triangle":"sine";
      var f= kind==="success"?620: kind==="in"?440: kind==="out"?300:520;
      o.frequency.setValueAtTime(f,now);
      if(kind==="success") o.frequency.exponentialRampToValueAtTime(880,now+.15);
      g.gain.setValueAtTime(.0001,now);
      g.gain.exponentialRampToValueAtTime(kind==="success"?.05:.03,now+.02);
      g.gain.exponentialRampToValueAtTime(.0001,now+(kind==="success"?.25:.12));
      o.connect(g);g.connect(actx.destination);o.start(now);o.stop(now+(kind==="success"?.3:.14));
    }catch(e){}
  }

  /* ---------- helpers ---------- */
  function $(id){return document.getElementById(id);}
  var toastTimer=null;
  function toast(msg){
    var el=$("jfToast"),tx=$("jfToastText"); if(!el) return;
    tx.textContent=msg; el.style.opacity="1"; el.style.transform="translateX(-50%) translateY(0)";
    if(toastTimer) clearTimeout(toastTimer);
    toastTimer=setTimeout(function(){el.style.opacity="0";el.style.transform="translateX(-50%) translateY(16px)";},1700);
  }
  function todayKey(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
  function bumpStreak(){
    var last=get(LS.last), today=todayKey();
    if(last===today) return false;
    var n=parseInt(get(LS.streak)||"0",10)||0; n++;
    set(LS.streak,String(n)); set(LS.last,today);
    $("jfStreak").textContent=n;
    return true;
  }

  /* ---------- render text ---------- */
  var affIdx=0;
  function greeting(){
    var h=new Date().getHours(), s=t();
    return h<12?s.greetMorning:h<19?s.greetAfternoon:s.greetEvening;
  }
  function renderStatic(){
    var s=t();
    $("jfLang").textContent=s.langLabel;
    $("jfMute").textContent=muted?"🔇":"🔊";
    $("jfStreak").textContent=parseInt(get(LS.streak)||"0",10)||0;
    $("jfGreeting").textContent=greeting();
    $("jfIntentionLabel").textContent=s.intentionLabel;
    $("jfAffirm").textContent=s.affirmLabel;
    $("jfBreatheLabel").textContent=s.breatheLabel;
    $("jfBreatheTitle").textContent=s.breatheTitle;
    $("jfBreatheSub").textContent=s.breatheSub;
    $("jfRitualsLabel").textContent=s.ritualsLabel;
    $("jfCheckLabel").textContent=s.checkLabel;
    $("jfAffirmation").textContent=s.affs[affIdx % s.affs.length];
    document.documentElement.lang=lang;
    renderRituals();
    renderCheck();
  }
  function cycleAff(dir){
    var s=t(); affIdx=(affIdx+(dir||1)+s.affs.length)%s.affs.length;
    $("jfAffirmation").textContent=s.affs[affIdx];
  }

  /* ---------- rituals ---------- */
  function renderRituals(){
    var s=t(), wrap=$("jfRituals"); wrap.innerHTML="";
    s.rituals.forEach(function(r,i){
      var b=document.createElement("button");
      b.className="tapfx";
      b.style.cssText="width:100%;text-align:left;cursor:pointer;border:1px solid var(--line);border-radius:18px;padding:15px 16px;background:var(--card);display:flex;align-items:center;gap:14px";
      b.innerHTML='<div style="flex:0 0 auto;width:44px;height:44px;border-radius:13px;display:grid;place-items:center;background:var(--flow-soft);font-size:21px">'+r.icon+'</div>'+
        '<div style="flex:1;min-width:0"><div style="font:600 14.5px Inter;color:var(--ink)">'+r.t+'</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:2px">'+r.d+'</div></div>'+
        '<span style="color:var(--flow);font-size:18px">→</span>';
      b.addEventListener("click",function(){tone("tap");openRitual(i);});
      wrap.appendChild(b);
    });
  }
  function openRitual(i){
    var s=t(), r=s.rituals[i];
    $("jfRitualHead").innerHTML='<div style="font:600 10px Inter;letter-spacing:.28em;text-transform:uppercase;color:var(--flow);margin-bottom:8px">'+r.d+'</div>'+
      '<div style="font-family:Newsreader,serif;font-weight:600;font-size:27px;line-height:1.15;color:var(--ink)">'+r.icon+' '+r.t+'</div>';
    var st=$("jfRitualSteps"); st.innerHTML="";
    r.steps.forEach(function(step,n){
      var d=document.createElement("div");
      d.style.cssText="display:flex;gap:13px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;animation:jfRise .35s ease both;animation-delay:"+(n*60)+"ms";
      d.innerHTML='<div style="flex:0 0 auto;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--flow),var(--flow2));color:#fff;font:700 12px Inter">'+(n+1)+'</div>'+
        '<div style="font-size:14px;line-height:1.5;color:var(--ink)">'+step+'</div>';
      st.appendChild(d);
    });
    $("jfRitualDone").textContent=s.completeRitual;
    $("jfRitualView").style.display="block";
    $("jfRitualView").scrollTop=0;
  }

  /* ---------- energy check-in ---------- */
  function renderCheck(){
    var s=t(), wrap=$("jfCheckScale"); wrap.innerHTML="";
    var saved=parseInt(get(LS.energy)||"0",10)||0;
    for(var i=1;i<=5;i++){(function(v){
      var b=document.createElement("button");
      b.className="tapfx";
      var on=v<=saved;
      b.style.cssText="flex:1;cursor:pointer;border:1px solid "+(on?"var(--flow)":"var(--line)")+";background:"+(on?"var(--flow-soft)":"#fff")+";border-radius:13px;padding:12px 0;font-size:20px";
      b.textContent= v<=saved?"●":"○";
      b.setAttribute("aria-label","Nivel "+v);
      b.addEventListener("click",function(){
        set(LS.energy,String(v)); tone("tap"); renderCheck();
        $("jfCheckTip").textContent=s.tips[v-1]||s.energyTip0;
      });
      wrap.appendChild(b);
    })(i);}
    $("jfCheckTip").textContent= saved? (s.tips[saved-1]||"") : s.energyTip0;
  }

  /* ---------- breathing engine (4-7-8) ---------- */
  var bz={running:false,phase:0,round:1,rounds:4,timer:null,seq:null};
  function breatheReset(){
    bz.running=false; bz.phase=0; bz.round=1;
    if(bz.timer){clearTimeout(bz.timer);bz.timer=null;}
    var s=t();
    $("jfBreathePhase").textContent=s.prepare;
    $("jfBreatheCue").textContent=s.cueInhale;
    $("jfBreatheCount").textContent="";
    $("jfBreatheRound").textContent=s.round+" 1 "+s.of+" "+bz.rounds;
    $("jfBreatheToggle").textContent=s.start;
    var ring=$("jfBreatheRing"); ring.style.transitionDuration="0.4s"; ring.style.transform="scale(1)";
  }
  function setRing(scale,secs){
    var ring=$("jfBreatheRing");
    ring.style.transitionDuration=secs+"s";
    ring.style.transform="scale("+scale+")";
  }
  function countdown(secs,label){
    var s=t(), n=secs;
    $("jfBreatheCount").textContent=n;
    var iv=setInterval(function(){ n--; if(n>=1)$("jfBreatheCount").textContent=n; },1000);
    bz._iv=iv;
    return iv;
  }
  // phases: 0 inhale(4,scale 1.9,in), 1 hold(7,hold), 2 exhale(8,scale1,out)
  var PHASES=[
    {key:"inhale",secs:4,scale:1.9,cue:"cueInhale",lbl:"inhale",tone:"in"},
    {key:"hold",secs:7,scale:1.9,cue:"cueHold",lbl:"hold",tone:null},
    {key:"exhale",secs:8,scale:1,cue:"cueExhale",lbl:"exhale",tone:"out"}
  ];
  function runPhase(){
    if(!bz.running) return;
    var s=t(), p=PHASES[bz.phase];
    $("jfBreathePhase").textContent=s[p.lbl];
    $("jfBreatheCue").textContent=s[p.cue];
    $("jfBreatheRound").textContent=s.round+" "+bz.round+" "+s.of+" "+bz.rounds;
    if(p.tone) tone(p.tone);
    setRing(p.scale, p.secs);
    if(bz._iv) clearInterval(bz._iv);
    countdown(p.secs);
    bz.timer=setTimeout(function(){
      if(bz._iv) clearInterval(bz._iv);
      bz.phase++;
      if(bz.phase>=PHASES.length){
        bz.phase=0; bz.round++;
        if(bz.round>bz.rounds){ breatheFinish(); return; }
      }
      runPhase();
    }, p.secs*1000);
  }
  function breatheStart(){
    bz.running=true;
    $("jfBreatheToggle").textContent=t().pause;
    runPhase();
  }
  function breathePause(){
    bz.running=false;
    if(bz.timer){clearTimeout(bz.timer);bz.timer=null;}
    if(bz._iv) clearInterval(bz._iv);
    $("jfBreatheToggle").textContent=t().start;
  }
  function breatheFinish(){
    breathePause();
    tone("success");
    var s=t();
    $("jfBreathePhase").textContent="✓";
    $("jfBreatheCount").textContent="";
    $("jfBreatheCue").textContent=s.breatheDone;
    var up=bumpStreak();
    setTimeout(function(){
      $("jfBreatheView").style.display="none";
      breatheReset();
      toast(up?s.streakUp:s.breatheDone);
    },1400);
  }

  /* ---------- wiring ---------- */
  function init(){
    renderStatic();

    $("jfLang").addEventListener("click",function(){
      lang=(lang==="es")?"en":"es"; set(LS.lang,lang); tone("tap");
      breatheReset(); renderStatic();
    });
    $("jfMute").addEventListener("click",function(){
      muted=!muted; set(LS.mute,muted?"1":"0"); $("jfMute").textContent=muted?"🔇":"🔊";
      if(!muted) tone("tap");
    });
    $("jfAffirm").addEventListener("click",function(){
      tone("success");
      var up=bumpStreak();
      $("jfAffirm").textContent=t().affirmed;
      setTimeout(function(){ $("jfAffirm").textContent=t().affirmLabel; },1400);
      toast(up?t().streakUp:t().affirmed);
    });
    $("jfCycle").addEventListener("click",function(){tone("tap");cycleAff(1);});

    $("jfOpenBreathe").addEventListener("click",function(){
      tone("tap"); breatheReset(); $("jfBreatheView").style.display="block";
    });
    $("jfBreatheBack").addEventListener("click",function(){
      breathePause(); breatheReset(); $("jfBreatheView").style.display="none";
    });
    $("jfBreatheToggle").addEventListener("click",function(){
      tone("tap");
      if(bz.running) breathePause(); else breatheStart();
    });

    $("jfRitualBack").addEventListener("click",function(){
      tone("tap"); $("jfRitualView").style.display="none";
    });
    $("jfRitualDone").addEventListener("click",function(){
      tone("success"); var up=bumpStreak();
      $("jfRitualView").style.display="none";
      toast(up?t().streakUp:t().ritualDone);
    });

    $("jfBack").addEventListener("click",function(){
      tone("tap");
      try{ if(window.parent && window.parent!==window){ /* index viewer has its own Volver */ } }catch(e){}
      try{ history.length>1 ? history.back() : null; }catch(e){}
    });
  }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init);
  else init();
})();
</script>
</body>
</html>
